  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

eat(3,1fr);gap:20px\">\n      <sc-for list=\"{{ writing }}\" as=\"w\" hint-placeholder-count=\"6\">\n        <a href=\"{{ w.href }}\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;color:inherit;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--paper);display:flex;flex-direction:column\" style-hover=\"border-color:var(--clay)\">\n          <span style=\"position:relative;display:block;height:152px;background:var(--navy);overflow:hidden\">\n            <sc-if value=\"{{ w.hasImg }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ w.imgStyle }}\"><\u002Fspan><\u002Fsc-if>\n            <sc-if value=\"{{ w.noImg }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"{{ w.coverStyle }}\"><\u002Fspan><span style=\"position:absolute;inset:0;background-image:repeating-linear-gradient(135deg, rgba(255,255,255,.09) 0 2px, transparent 2px 15px)\"><\u002Fspan><\u002Fsc-if>\n            <span style=\"position:absolute;left:18px;bottom:16px;font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.94);text-shadow:0 1px 5px rgba(0,0,0,.55)\">{{ w.tag }}<\u002Fspan>\n          <\u002Fspan>\n          <span style=\"display:flex;flex-direction:column;gap:14px;padding:22px;flex:1\">\n            <span style=\"font-family:var(--serif);font-size:21px;line-height:1.25;flex:1\">{{ w.title }}<\u002Fspan>\n            <span style=\"font-size:13.5px;color:var(--slate)\">Read on LinkedIn ↗<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <a href=\"https://www.linkedin.com/in/preksha-rathore/recent-activity/articles/\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;margin-top:40px;text-decoration:none;font:inherit;font-size:15px;color:var(--clay);font-weight:600\">All articles on LinkedIn ↗<\u002Fa>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===================== FOOTER ===================== -->\n  <footer style=\"border-top:1px solid var(--line);background:var(--paper-2)\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:38px 32px;display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between;align-items:center\">\n      <div style=\"font-family:var(--serif);font-size:18px\">Preksha Rathore<\u002Fdiv>\n      <div style=\"display:flex;gap:24px;align-items:center;font-size:14px\">\n        <button onclick=\"{{ goWork }}\" style=\"background:none;border:none;cursor:pointer;font:inherit;color:var(--ink-soft)\">Work<\u002Fbutton>\n        <button onclick=\"{{ goWriting }}\" style=\"background:none;border:none;cursor:pointer;font:inherit;color:var(--ink-soft)\">Writing<\u002Fbutton>\n        <button onclick=\"{{ goAbout }}\" style=\"background:none;border:none;cursor:pointer;font:inherit;color:var(--ink-soft)\">About<\u002Fbutton>\n        <button onclick=\"{{ goContact }}\" style=\"background:none;border:none;cursor:pointer;font:inherit;color:var(--ink-soft)\">Contact<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"font-family:var(--mono);font-size:11px;color:var(--slate);letter-spacing:.06em\">SYDNEY · NSW<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Terracotta&quot;,&quot;options&quot;:[&quot;Terracotta&quot;,&quot;Ink Blue&quot;,&quot;Forest&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;openToWork&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { page: 'home', caseId: 'tax-campaign' };\n  rootRef = React.createRef();\n  emailFrame = React.createRef();\n  writingRef = React.createRef();\n  carouselRef = React.createRef();\n\n  accentMap = {\n    'Terracotta': { clay: '#bf4e2a', soft: '#ecd6c9', peach: '#e9a98f' },\n    'Ink Blue':   { clay: '#2f5fd0', soft: '#d6def5', peach: '#a7bdf0' },\n    'Forest':     { clay: '#2f6b4f', soft: '#d2e2d8', peach: '#9ec9ad' },\n  };\n\n  applyAccent() {\n    const r = this.rootRef.current;\n    if (!r) return;\n    const a = this.accentMap[this.props.accent] || this.accentMap['Terracotta'];\n    r.style.setProperty('--clay', a.clay);\n    r.style.setProperty('--clay-soft', a.soft);\n    r.style.setProperty('--peach', a.peach);\n  }\n  componentDidMount() { this.applyAccent(); this.initEmail(); }\n  componentDidUpdate() { this.applyAccent(); this.initEmail(); }\n  componentWillUnmount() {\n    const f = this.emailFrame.current;\n    if (f && f.__raf) { cancelAnimationFrame(f.__raf); f.__raf = null; }\n  }\n\n  initEmail() {\n    const f = this.emailFrame.current;\n    if (!f) return;\n    // one-time sizing per iframe node\n    if (!f.__fitted) {\n      f.__fitted = true;\n      const frame = f.parentElement;\n      const fit = () => {\n        const cw = frame.clientWidth || 600;\n        const ch = frame.clientHeight || 500;\n        const EMAILW = 680;\n        const s = Math.min(1, cw / EMAILW);\n        f.style.width = EMAILW + 'px';\n        f.style.transformOrigin = 'top left';\n        f.style.transform = 'scale(' + s + ')';\n        f.style.left = Math.max(0, Math.round((cw - EMAILW * s) / 2)) + 'px';\n        f.style.height = Math.round(ch / s) + 'px';\n        f.__vh = Math.round(ch / s);\n      };\n      fit();\n      window.addEventListener('resize', fit);\n    }\n    // (re)start the loop whenever it isn't currently running on this node\n    if (f.__raf == null) this.startEmailScroll(f);\n  }\n\n  startEmailScroll(f) {\n    const tick = () => {\n      if (!f.isConnected) { f.__raf = null; return; }\n      let win, doc;\n      try { win = f.contentWindow; doc = win && win.document; } catch (e) { f.__raf = requestAnimationFrame(tick); return; }\n      if (!doc || !doc.body) { f.__raf = requestAnimationFrame(tick); return; }\n      const vh = f.__vh || 430;\n      const max = Math.max(0, doc.body.scrollHeight - vh);\n      const st = f.__st || (f.__st = { y: 0, dir: 1, pause: 0 });\n      if (max <= 0) { st.y = 0; }      // content not measured yet, wait\n      else if (st.pause > 0) { st.pause -= 16; }\n      else {\n        st.y += st.dir * 2.2;\n        if (st.y >= max) { st.y = max; st.dir = -1; st.pause = 1100; }\n        else if (st.y <= 0) { st.y = 0; st.dir = 1; st.pause = 1100; }\n      }\n      try { win.scrollTo(0, st.y); } catch (e) {}\n      f.__raf = requestAnimationFrame(tick);\n    };\n    if (f.__raf) cancelAnimationFrame(f.__raf);\n    f.__raf = requestAnimationFrame(tick);\n  }\n\n  scrollTop() {\n    if (typeof window !== 'undefined') { try { window.scrollTo(0, 0); } catch (e) {} }\n  }\n  go = (page) => { this.setState({ page }); this.scrollTop(); };\n  open = (caseId) => { this.setState({ page: 'case', caseId }); this.scrollTop(); };\n  scrollToWriting = () => {\n    const el = this.writingRef.current;\n    if (!el || typeof window === 'undefined') return;\n    const y = el.getBoundingClientRect().top + window.scrollY - 70;\n    try { window.scrollTo({ top: y, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, y); }\n  };\n  goWriting = () => { this.go('writing'); };\n  scrollCarousel = (dir) => {\n    const el = this.carouselRef.current;\n    if (!el) return;\n    try { el.scrollBy({ left: dir * 360, behavior: 'smooth' }); } catch (e) { el.scrollLeft += dir * 360; }\n  };\n\n  get caseData() {\n    return [\n      {\n        id: 'tax-campaign', num: '01',\n        eyebrow: 'Case Study 01 · Lifecycle & Retention',\n        title: 'A 285% ROI telemarketing program, built from scratch',\n        client: 'UNICEF Australia',\n        role: 'Retention Project Lead, Tax Campaign',\n        period: '2026 – Present',\n        channels: 'Telemarketing · Landing page · Email · SMS',\n        metaLine: 'UNICEF Australia · Matched giving · Built from scratch',\n        headlineMetric: '285% ROI',\n        summary: 'Owning the strategy, audience and channel decisions for the tax retention campaign, and building a brand-new matched-gift telemarketing program that returned $3.85 for every $1.',\n        metrics: [\n          { v: '285%', l: 'ROI on the matched-gift telemarketing program, $3.85 back per $1' },\n          { v: '2', l: 'New telemarketing programs built from scratch' },\n          { v: 'Solo', l: 'Strategy, messaging, assets and audience targeting owned end-to-end' },\n        ],\n        context: [\n          'Match funding usually leans on philanthropists or corporates. This year, with tighter market conditions, we took a different route: invite a select group of mid and high-value donors to seed a matched-gift pool, then use that pool to match other donors’ gifts.',\n          'There was no existing playbook. The program had to be designed, built and taken to market inside the tax window, the most commercially important moment in the calendar.',\n        ],\n        approach: [\n          { n: '01', title: 'Designed the matched-gift strategy', body: 'Defined who to approach, how the matched pool would work and how it would be positioned, selecting mid and high-value donors to seed the match.' },\n          { n: '02', title: 'Built the messaging and assets', body: 'Shaped the campaign narrative and produced every asset end-to-end, from the donor landing page to the email and SMS that carried the appeal.' },\n          { n: '03', title: 'Launched the telemarketing program', body: 'Briefed and trained the telemarketers on the offer and key messages, then built the donation flow so donors could give securely by phone or on the landing page.' },\n          { n: '04', title: 'Owned every audience decision', body: 'Decided who to target and how, across the full campaign, and ran it end-to-end.' },\n        ],\n        takeaway: 'Building something new under deadline pressure is where strategy earns its keep. A first-of-its-kind matched-gift program returned $3.85 for every $1.',\n      },\n      {\n        id: 'choice-retention', num: '02',\n        eyebrow: 'Case Study 02 · Retention & Segmentation',\n        title: 'Cutting churn by a third with segmentation-led journeys',\n        client: 'CHOICE',\n        role: 'Direct Marketing Coordinator',\n        period: '2019 – 2024',\n        channels: 'Email · SMS · Direct Mail',\n        metaLine: 'CHOICE · Salesforce Marketing Cloud · Subscriptions',\n        headlineMetric: '−33% cancellations',\n        summary: 'Designing segmentation-led retention and winback journeys inside Salesforce Marketing Cloud to stabilise recurring subscription revenue.',\n        metrics: [\n          { v: '−33%', l: 'Reduction in cancellations' },\n          { v: '+17%', l: 'Increase in reactivations' },\n          { v: 'SFMC', l: 'Journey Builder · Automation Studio · AMPscript' },\n        ],\n        context: [\n          'CHOICE runs on recurring subscriptions, so small movements in cancellation and reactivation rates translate directly into revenue stability. The lifecycle program was treating subscribers too uniformly to move those numbers.',\n          'The opportunity was to segment by behaviour and lifecycle stage, then build journeys that met each cohort with the right message at the right moment.',\n        ],\n        approach: [\n          { n: '01', title: 'Segmented by cancel type', body: 'Segmented the base by active cancels versus passive lapsers and their engagement history, so retention effort matched where each subscriber actually was.' },\n          { n: '02', title: 'A/B tested content type', body: 'A/B tested which content worked for which audience, product-led or advocacy-led.' },\n          { n: '03', title: 'Built it all in SFMC', body: 'Built all the journeys, SQL and technical delivery in Salesforce Marketing Cloud.' },\n          { n: '04', title: 'Reported quarterly to improve', body: 'Reported quarterly to drive improvements. Active cancels reactivated at a much higher rate from product-focused content, while passive lapsers responded to advocacy content.' },\n        ],\n        takeaway: 'This isn’t really about lifecycle. It’s about understanding where your audience is actually coming from, and personalising content to what resonates, without being creepy.',\n      },\n      {\n        id: 'ai-competitor', num: '03',\n        eyebrow: 'Case Study 03 · AI & Emerging Tech',\n        title: 'An always-on AI agent that reads 30+ competitors’ digital comms',\n        client: 'UNICEF Australia',\n        role: 'CRM & Lifecycle Marketing',\n        period: '2023 – 2024',\n        channels: 'Internal Tooling · Research',\n        metaLine: 'UNICEF Australia · Always-on agent · 30+ brands',\n        headlineMetric: '30+ brands tracked',\n        summary: 'An always-on AI tool that ingests competitor email activity from 30+ brands into a living, ever-growing database the whole team can search and query.',\n        metrics: [\n          { v: '30+', l: 'Competitor brands captured in an always-on, growing database' },\n          { v: 'Always-on', l: 'Every inbound competitor email feeds the dataset automatically' },\n          { v: '1 view', l: 'Searchable intelligence hub anyone on the team can query' },\n        ],\n        context: [\n          'Competitor email activity is one of the richest signals for testing, content, creative and messaging decisions, but it lives scattered across inboxes and is rarely captured in a way a team can actually query.',\n          'I wanted a single, always-on source of truth that kept growing on its own, with an agent that surfaced patterns rather than just storing screenshots.',\n        ],\n        approach: [\n          { n: '01', title: 'Built an always-on database', body: 'Set up automated capture so every competitor email we received fed a structured, ever-growing database, scaling from a handful of brands to 30+ without manual collection.' },\n          { n: '02', title: 'Trained a custom agent', body: 'Built a custom agent on top of the dataset, tuned to the categories and questions the marketing team actually asks.' },\n          { n: '03', title: 'Surfaced decisions, not just tests', body: 'Designed the agent to inform A/B testing hypotheses as well as the content, copy, creative and messaging decisions we put into market.' },\n          { n: '04', title: 'Made it self-serve', body: 'Packaged it so the team can query competitor intelligence on demand instead of relying on manual, ad-hoc reviews.' },\n        ],\n        takeaway: 'AI is most useful when it removes friction from real decisions. An always-on database of 30+ competitors turned market noise into a queryable input for sharper testing, content and creative.',\n      },\n      {\n        id: 'audience-framework', num: '04',\n        eyebrow: 'Case Study 04 · Marketing Ops & Governance',\n        title: 'A contact-strategy framework across 7–8 cohorts',\n        client: 'UNICEF Australia',\n        role: 'CRM Journey Specialist',\n        period: '2024 – Present',\n        channels: 'Email · SMS · Strategy',\n        metaLine: 'UNICEF Australia · Contact governance · 7–8 cohorts',\n        headlineMetric: 'Smarter contact governance',\n        summary: 'Mapping every audience cohort by communication exposure and frequency so campaign planning stops competing with itself.',\n        metrics: [\n          { v: '7–8', l: 'Cohorts governed by exposure & frequency' },\n          { v: '1', l: 'Source of truth for audience digital comms management' },\n        ],\n        context: [\n          'A high-volume program means cohorts overlap constantly, the same supporter can sit inside several campaigns at once. Without a shared picture of who is being contacted, how often and by which channel, planning becomes guesswork and over-contact creeps in.',\n          'The team needed a single, legible view of contact exposure that anyone could plan against, not a spreadsheet only one person understood.',\n        ],\n        approach: [\n          { n: '01', title: 'Mapped the audience landscape', body: 'Built a segmentation and contact-strategy framework across 7–8 cohorts spanning multiple acquisition channels, governing frequency, suppression logic and exposure.' },\n          { n: '02', title: 'Made it a shared framework', body: 'Turned the map into a reusable framework the whole team could plan against, making contact strategy explicit and visible.' },\n          { n: '03', title: 'Automated the build', body: 'Introduced scalable automation frameworks in SFMC that cut campaign build time by up to two hours and sped up time-sensitive sends.' },\n          { n: '04', title: 'Enabled smarter planning', body: 'Gave campaign planning a data-backed starting point, so channel and frequency decisions were deliberate rather than reactive.' },\n        ],\n        takeaway: 'You can’t optimise what you can’t see. Making contact exposure visible turned frequency into a strategic choice for the whole team.',\n      },\n    ];\n  }\n\n  get tools() {\n    return ['Salesforce Marketing Cloud', 'Journey Builder', 'Automation Studio', 'AMPscript', 'SQL', 'HubSpot', 'Google Analytics', 'Power BI', 'Tableau', 'Claude Code', 'Microsoft Copilot', 'Jira', 'Confluence', 'Miro', 'Figma'];\n  }\n\n  get aiUses() {\n    return [\n      { k: 'In the build', t: 'Less time wiring, more time deciding', b: 'I write and debug the AMPscript and SQL behind segmentation and personalisation in the terminal, so SFMC builds that used to take hours take minutes, and the time saved goes back into strategy.' },\n      { k: 'In the analysis', t: 'Signal out of the noise', b: 'I built an always-on AI tool that reads competitor email activity across 30+ brands and makes it searchable, turning scattered market signals into insight the whole team can act on.' },\n      { k: 'Personalisation at scale', t: 'More variants, properly tested', b: 'I use AI to draft and stress-test journey copy and creative, so programs are shaped by more experiments rather than fewer opinions, with the right message reaching each micro-segment.' },\n      { k: 'In the craft', t: 'Strategic creativity, brought to life', b: 'I build creative emails in HTML with AI, turning strategic ideas into finished, on-brand work.' },\n    ];\n  }\n\n  get transfer() {\n    return [\n      { from: 'Donor retention & winback', to: 'Subscriber & customer retention' },\n      { from: 'High-stakes tax appeal moments', to: 'Peak acquisition & retention campaigns' },\n      { from: 'Supporter onboarding → activation', to: 'Customer onboarding → activation → LTV' },\n      { from: 'Contact governance across cohorts', to: 'Frequency, deliverability & sends at scale' },\n      { from: 'SFMC · AMPscript · SQL · Journey Builder', to: 'Modern CRM & lifecycle automation, directly transferable' },\n    ];\n  }\n\n  get nowList() {\n    return [\n      { t: 'Sharpening modern CRM fluency', b: 'Mapping my SFMC and Journey Builder experience onto modern CRM and lifecycle platforms. The tooling shifts; the thinking transfers.' },\n      { t: 'Extending my AI toolkit', b: 'Learning N8N to automate more of my workflow and connect the tools I rely on.' },\n      { t: 'Stronger suppression lists', b: 'Using AI for the insight and analysis behind better, stronger suppression lists.' },\n    ];\n  }\n\n  get writing() {\n    const c = (bg) => ({ position: 'absolute', inset: 0, background: bg });\n    const items = [\n      { tag: 'Data-driven', coverStyle: c('#11162a'), img: 'assets/writing/data-driven.png', title: 'Data-driven marketing isn’t a catchphrase, it’s a mindset', href: 'https://www.linkedin.com/pulse/data-driven-marketing-isnt-catchphrase-its-mindset-preksha-rathore-iikgc/' },\n      { tag: 'Stakeholders', coverStyle: c('#bf4e2a'), img: 'assets/writing/stakeholders.png', title: 'Stakeholder smarts: marketers who think like a BA deliver more', href: 'https://www.linkedin.com/pulse/stakeholder-smarts-marketers-think-like-ba-deliver-preksha-rathore-u1o2c/' },\n      { tag: 'Strategy', coverStyle: c('#2f6b4f'), img: 'assets/writing/strategy-map.png', title: 'If it feels messy, it probably needs a map', href: 'https://www.linkedin.com/pulse/feels-messy-probably-needs-map-preksha-rathore-zykec/' },\n      { tag: 'Marketing ops', coverStyle: c('#3b4256'), img: 'assets/writing/documents.png', title: 'Documents that actually work: the invisible backbone of marketing teams', href: 'https://www.linkedin.com/pulse/documents-actually-work-invisible-backbone-marketing-teams-rathore-ahl4c/' },\n      { tag: 'Business analysis', coverStyle: c('#5b2f54'), img: 'assets/writing/ba-skills.png', title: 'Beyond the basics: 5 more BA skills marketers should adopt', href: 'https://www.linkedin.com/pulse/beyond-basics-5-more-ba-skills-marketers-should-adopt-preksha-rathore-81o1c/' },\n      { tag: 'Retention', coverStyle: c('#1f5a63'), img: 'assets/writing/retention-loop.png', title: 'From opt-outs to insights: make your exit feedback work', href: 'https://www.linkedin.com/pulse/from-opt-outs-insights-make-your-exit-feedback-preksha-rathore-cvjxc/' },\n    ];\n    return items.map(w => ({ ...w, hasImg: !!w.img, noImg: !w.img, imgStyle: w.img ? { position: 'absolute', inset: 0, backgroundImage: 'url(\"' + w.img + '\")', backgroundSize: 'cover', backgroundPosition: 'center' } : null }));\n  }\n\n  get timeline() {\n    return [\n      { period: 'Apr 2026 – Present', org: 'UNICEF Australia', role: 'Retention Project Lead, Tax Campaign', body: 'Project lead for the Tax retention campaign across 4 channels (email, SMS, telemarketing and direct mail). Built two telemarketing programs from scratch, including a matched-gift program at 285% ROI. Own campaign KPIs, budgets and external vendor relationships, align 15+ stakeholders, and manage two direct reports.' },\n      { period: 'Sep 2024 – Present', org: 'UNICEF Australia', role: 'CRM Journey Specialist', body: 'Lead lifecycle and engagement strategy across email and SMS, onboarding, activation, retention and reactivation journeys in SFMC. Delivered 30%+ YoY email revenue growth, doubled SMS engagement and built a 7–8 cohort contact-strategy framework.' },\n      { period: 'Aug 2023 – Sep 2024', org: 'CHOICE', role: 'Business Analyst', body: 'Led business analysis across payment gateway, subscription, CRM and CMS migrations, unblocking a stalled CMS migration with 20 stakeholders across six teams and identifying 50–60% process savings through RPA evaluation.' },\n      { period: 'Nov 2019 – Sep 2024', org: 'CHOICE', role: 'Direct Marketing Coordinator', body: 'Owned lifecycle and engagement campaigns across email, SMS and direct mail for a subscription business. Built segmentation-led retention and winback journeys in SFMC that cut cancellations 33% and lifted reactivations 17%.' },\n    ];\n  }\n\n  renderVals() {\n    const raw = this.caseData;\n    const ai = raw.find(c => c.id === 'ai-competitor');\n    const ordered = [ai, ...raw.filter(c => c.id !== 'ai-competitor')].map((c, i) => {\n      const num = String(i + 1).padStart(2, '0');\n      const topic = (c.eyebrow.split('· ')[1] || '').trim();\n      return { ...c, num, eyebrow: 'Case Study ' + num + ' · ' + topic };\n    });\n    const cases = ordered;\n    const page = this.state.page;\n    const idx = Math.max(0, cases.findIndex(c => c.id === this.state.caseId));\n    const nextId = cases[(idx + 1) % cases.length].id;\n    const current = { ...cases[idx], next: () => this.open(nextId) };\n    return {\n      page,\n      isHome: page === 'home',\n      isWork: page === 'work',\n      isAbout: page === 'about',\n      isContact: page === 'contact',\n      isWriting: page === 'writing',\n      email: ['rathorepreksha97', 'gmail.com'].join('@'),\n      emailHref: 'mailto:' + ['rathorepreksha97', 'gmail.com'].join('@'),\n      isCase: page === 'case',\n      openToWork: this.props.openToWork ?? true,\n      rootRef: this.rootRef,\n      emailFrame: this.emailFrame,\n      writingRef: this.writingRef,\n      carouselRef: this.carouselRef,\n      cases: cases.map(c => ({ ...c, open: () => this.open(c.id) })),\n      featured: cases.slice(0, 3).map(c => ({ ...c, open: () => this.open(c.id), isPink: c.id === 'choice-retention', isGreen: c.id !== 'choice-retention' })),\n      current,\n      tools: this.tools,\n      aiUses: this.aiUses,\n      transfer: this.transfer,\n      nowList: this.nowList,\n      writing: this.writing,\n      timeline: this.timeline,\n      goHome: () => this.go('home'),\n      goWork: () => this.go('work'),\n      goAbout: () => this.go('about'),\n      goContact: () => this.go('contact'),\n      goWriting: () => this.goWriting(),\n      carPrev: () => this.scrollCarousel(-1),\n      carNext: () => this.scrollCarousel(1),\n      openAi: () => this.open('ai-competitor'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
